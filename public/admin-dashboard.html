<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIX TECH - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        .stat-number {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .actions-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .submissions-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
        }
        .submission-item {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .submission-item.verified { background: #d4edda; }
        .verify-btn { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .verified-badge { background: #28a745; color: white; padding: 5px 15px; border-radius: 20px; }
        .loading { text-align: center; padding: 60px; color: #999; }
        @media (max-width: 768px) {
            .submission-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🔐 QUANTIX TECH - Admin Dashboard</h1>
            <div>
                <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total Submissions</div></div>
            <div class="stat-card"><div class="stat-number" id="verifiedCount">0</div><div>Verified Contacts</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div>
            <div class="stat-card"><div class="stat-number" id="targetProgress">0%</div><div>Target (500)</div></div>
        </div>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="downloadVCF()">📥 Download VCF</button>
            <button class="btn btn-success" onclick="verifyAll()">✓ Verify All</button>
            <button class="btn btn-secondary" onclick="exportCSV()">📄 Export CSV</button>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by name or phone..." onkeyup="searchSubmissions()">
        </div>

        <div class="submissions-section">
            <h2>📋 All Submissions</h2>
            <div id="submissionsContainer"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <script>
        // ========== SIMPLE AUTH ==========
        // Get passkey from URL or localStorage
        let passkey = localStorage.getItem('adminPasskey');
        
        // Check URL for passkey
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('passkey')) {
            passkey = urlParams.get('passkey');
            localStorage.setItem('adminPasskey', passkey);
            // Remove from URL
            window.history.replaceState({}, document.title, '/admin-dashboard.html');
        }
        
        // If no passkey, redirect
        if (!passkey) {
            alert('Please login from main page');
            window.location.href = '/';
        }
        
        console.log('Passkey:', passkey);
        
        // ========== GLOBALS ==========
        let allSubmissions = [];
        let currentFilter = 'all';
        let currentSearch = '';
        
        // ========== API CALLS ==========
        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'x-admin-passkey': passkey }
                });
                if (res.status === 401) { logout(); return; }
                const stats = await res.json();
                document.getElementById('totalCount').textContent = stats.total || 0;
                document.getElementById('verifiedCount').textContent = stats.verified || 0;
                document.getElementById('pendingCount').textContent = stats.pending || 0;
                const progress = ((stats.verified || 0) / 500 * 100).toFixed(1);
                document.getElementById('targetProgress').textContent = `${progress}%`;
            } catch(e) { console.error(e); }
        }
        
        async function loadSubmissions() {
            try {
                const res = await fetch('/api/admin/submissions', {
                    headers: { 'x-admin-passkey': passkey }
                });
                if (res.status === 401) { logout(); return; }
                allSubmissions = await res.json();
                displaySubmissions();
            } catch(e) {
                document.getElementById('submissionsContainer').innerHTML = '<div class="loading">Error loading data</div>';
            }
        }
        
        function displaySubmissions() {
            let filtered = [...allSubmissions];
            if (currentFilter === 'pending') filtered = filtered.filter(s => s.verified === 0);
            if (currentFilter === 'verified') filtered = filtered.filter(s => s.verified === 1);
            if (currentSearch) {
                filtered = filtered.filter(s => 
                    s.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                    s.phone.includes(currentSearch)
                );
            }
            
            const container = document.getElementById('submissionsContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No submissions found</div>';
                return;
            }
            
            container.innerHTML = '';
            filtered.forEach(sub => {
                const div = document.createElement('div');
                div.className = `submission-item ${sub.verified === 1 ? 'verified' : ''}`;
                div.innerHTML = `
                    <div>
                        <div><strong>${escapeHtml(sub.name)}</strong></div>
                        <div>📞 ${escapeHtml(sub.phone)}</div>
                        <div><small>📅 ${new Date(sub.submitted_at).toLocaleString()}</small></div>
                    </div>
                    <div>
                        ${sub.verified === 0 ? `<button class="verify-btn" onclick="verifyContact(${sub.id})">✓ Verify</button>` : '<span class="verified-badge">✅ Verified</span>'}
                        <button class="delete-btn" onclick="deleteContact(${sub.id})">🗑 Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        async function verifyContact(id) {
            const res = await fetch(`/api/admin/verify/${id}`, {
                method: 'PUT',
                headers: { 'x-admin-passkey': passkey }
            });
            if (res.ok) { loadStats(); loadSubmissions(); alert('✅ Verified!'); }
        }
        
        async function verifyAll() {
            const pending = allSubmissions.filter(s => s.verified === 0);
            if (pending.length === 0) { alert('No pending contacts'); return; }
            if (confirm(`Verify ${pending.length} contacts?`)) {
                for (const sub of pending) {
                    await fetch(`/api/admin/verify/${sub.id}`, { method: 'PUT', headers: { 'x-admin-passkey': passkey } });
                }
                loadStats(); loadSubmissions();
                alert(`✅ Verified ${pending.length} contacts!`);
            }
        }
        
        async function deleteContact(id) {
            if (confirm('Delete this contact?')) {
                await fetch(`/api/admin/delete/${id}`, { method: 'DELETE', headers: { 'x-admin-passkey': passkey } });
                loadStats(); loadSubmissions();
            }
        }
        
        function downloadVCF() { window.location.href = `/api/admin/generate-vcf?passkey=${passkey}`; }
        
        function exportCSV() {
            const verified = allSubmissions.filter(s => s.verified === 1);
            if (verified.length === 0) { alert('No verified contacts'); return; }
            let csv = 'Name,Phone,Date\n';
            verified.forEach(s => csv += `"${s.name}","${s.phone}","${new Date(s.submitted_at).toLocaleString()}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'quantix-contacts.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        function filterSubmissions(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            displaySubmissions();
        }
        
        function searchSubmissions() {
            currentSearch = document.getElementById('searchInput').value;
            displaySubmissions();
        }
        
        function refreshData() { loadStats(); loadSubmissions(); alert('Refreshed!'); }
        
        function logout() {
            localStorage.removeItem('adminPasskey');
            window.location.href = '/';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Add filter buttons to DOM
        const filterDiv = document.querySelector('.submissions-section h2');
        if (filterDiv) {
            const btnContainer = document.createElement('div');
            btnContainer.style.marginBottom = '20px';
            btnContainer.innerHTML = `
                <button class="btn btn-secondary filter-btn" style="margin-right:10px" onclick="filterSubmissions('all')">All</button>
                <button class="btn btn-secondary filter-btn" style="margin-right:10px" onclick="filterSubmissions('pending')">Pending</button>
                <button class="btn btn-secondary filter-btn" onclick="filterSubmissions('verified')">Verified</button>
            `;
            filterDiv.parentNode.insertBefore(btnContainer, filterDiv.nextSibling);
        }
        
        // Load everything
        loadStats();
        loadSubmissions();
    </script>
</body>
</html>
