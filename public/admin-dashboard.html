<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIX TECH - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        /* Actions Bar */
        .actions-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Search Bar */
        .search-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Submissions List */
        .submissions-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .submissions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .submissions-header h2 {
            color: #333;
            font-size: 20px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 6px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        /* Submission Item */
        .submission-item {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            background: white;
        }

        .submission-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .submission-item.verified {
            background: #d4edda;
            border-color: #c3e6cb;
        }

        .submission-info {
            flex: 1;
        }

        .submission-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .submission-phone {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .submission-date {
            color: #999;
            font-size: 12px;
        }

        .submission-actions {
            display: flex;
            gap: 10px;
        }

        .verify-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .verify-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .verified-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
            font-size: 18px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .submission-item {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .submission-actions {
                justify-content: center;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast animation */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <h1>🔐 QUANTIX TECH - Admin Dashboard</h1>
            <div class="header-buttons">
                <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Submissions</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="verifiedCount">0</div>
                <div class="stat-label">Verified Contacts</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending Verification</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-number" id="targetProgress">0%</div>
                <div class="stat-label">Target Progress (500)</div>
            </div>
        </div>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <button class="btn btn-primary" onclick="downloadVCF()">📥 Download VCF File</button>
            <button class="btn btn-success" onclick="verifyAll()">✓ Verify All Pending</button>
            <button class="btn btn-secondary" onclick="exportCSV()">📄 Export to CSV</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by name or phone number..." onkeyup="searchSubmissions()">
        </div>

        <!-- Submissions List -->
        <div class="submissions-section">
            <div class="submissions-header">
                <h2>📋 All Submissions</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterSubmissions('all')">All</button>
                    <button class="filter-btn" onclick="filterSubmissions('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterSubmissions('verified')">Verified</button>
                </div>
            </div>
            <div id="submissionsContainer">
                <div class="loading">Loading submissions...</div>
            </div>
        </div>
    </div>

    <script>
   // Get passkey from localStorage
let passkey = localStorage.getItem('adminPasskey');

// Check if authenticated
if (!passkey) {
    alert('Session expired. Please login again.');
    window.location.href = '/';
}

console.log('Admin authenticated with passkey:', passkey);
        
        // ========== GLOBAL VARIABLES ==========
        let allSubmissions = [];
        let currentFilter = 'all';
        let currentSearch = '';
        
        // ========== LOAD DATA ==========
        async function loadData() {
            await loadStats();
            await loadSubmissions();
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: { 'x-admin-passkey': passkey }
                });
                
                if (response.status === 401) {
                    handleUnauthorized();
                    return;
                }
                
                const stats = await response.json();
                document.getElementById('totalCount').textContent = stats.total;
                document.getElementById('verifiedCount').textContent = stats.verified;
                document.getElementById('pendingCount').textContent = stats.pending;
                
                const progress = ((stats.verified / 500) * 100).toFixed(1);
                document.getElementById('targetProgress').textContent = `${progress}%`;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadSubmissions() {
            try {
                const response = await fetch('/api/admin/submissions', {
                    headers: { 'x-admin-passkey': passkey }
                });
                
                if (response.status === 401) {
                    handleUnauthorized();
                    return;
                }
                
                allSubmissions = await response.json();
                displaySubmissions();
            } catch (error) {
                document.getElementById('submissionsContainer').innerHTML = 
                    '<div class="loading">❌ Error loading submissions. Make sure server is running.</div>';
            }
        }
        
        // ========== DISPLAY SUBMISSIONS ==========
        function displaySubmissions() {
            let filtered = [...allSubmissions];
            
            // Apply filter
            if (currentFilter === 'pending') {
                filtered = filtered.filter(sub => sub.verified === 0);
            } else if (currentFilter === 'verified') {
                filtered = filtered.filter(sub => sub.verified === 1);
            }
            
            // Apply search
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(sub => 
                    sub.name.toLowerCase().includes(searchLower) || 
                    sub.phone.includes(searchLower)
                );
            }
            
            const container = document.getElementById('submissionsContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No submissions found</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            filtered.forEach(sub => {
                const div = document.createElement('div');
                div.className = `submission-item ${sub.verified === 1 ? 'verified' : ''}`;
                
                div.innerHTML = `
                    <div class="submission-info">
                        <div class="submission-name">${escapeHtml(sub.name)}</div>
                        <div class="submission-phone">📞 ${escapeHtml(sub.phone)}</div>
                        <div class="submission-date">📅 ${new Date(sub.submitted_at).toLocaleString()}</div>
                    </div>
                    <div class="submission-actions">
                        ${sub.verified === 0 ? 
                            `<button class="verify-btn" onclick="verifyContact(${sub.id})">✓ Verify</button>` : 
                            '<span class="verified-badge">✅ Verified</span>'
                        }
                        <button class="delete-btn" onclick="deleteContact(${sub.id})">🗑 Delete</button>
                    </div>
                `;
                
                container.appendChild(div);
            });
        }
        
        // ========== ACTIONS ==========
        async function verifyContact(id) {
            try {
                const response = await fetch(`/api/admin/verify/${id}`, {
                    method: 'PUT',
                    headers: { 'x-admin-passkey': passkey }
                });
                
                if (response.ok) {
                    await loadData();
                    showToast('✅ Contact verified successfully!', 'success');
                }
            } catch (error) {
                alert('Error verifying contact');
            }
        }
        
        async function verifyAll() {
            const pending = allSubmissions.filter(sub => sub.verified === 0);
            if (pending.length === 0) {
                showToast('No pending contacts to verify', 'info');
                return;
            }
            
            if (confirm(`Verify all ${pending.length} pending contacts?`)) {
                for (const sub of pending) {
                    await fetch(`/api/admin/verify/${sub.id}`, {
                        method: 'PUT',
                        headers: { 'x-admin-passkey': passkey }
                    });
                }
                await loadData();
                showToast(`✅ Verified ${pending.length} contacts!`, 'success');
            }
        }
        
        async function deleteContact(id) {
            if (confirm('Are you sure you want to delete this contact?')) {
                try {
                    const response = await fetch(`/api/admin/delete/${id}`, {
                        method: 'DELETE',
                        headers: { 'x-admin-passkey': passkey }
                    });
                    
                    if (response.ok) {
                        await loadData();
                        showToast('🗑 Contact deleted successfully', 'success');
                    }
                } catch (error) {
                    alert('Error deleting contact');
                }
            }
        }
        
        function downloadVCF() {
            window.location.href = `/api/admin/generate-vcf?passkey=${passkey}`;
        }
        
        function exportCSV() {
            const verified = allSubmissions.filter(sub => sub.verified === 1);
            if (verified.length === 0) {
                showToast('No verified contacts to export', 'info');
                return;
            }
            
            let csv = 'Name,Phone Number,Submitted Date\n';
            verified.forEach(sub => {
                csv += `"${sub.name}","${sub.phone}","${new Date(sub.submitted_at).toLocaleString()}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'quantix-contacts.csv';
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('📄 CSV exported successfully!', 'success');
        }
        
        // ========== FILTER & SEARCH ==========
        function filterSubmissions(filter) {
            currentFilter = filter;
            
            // Update active button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displaySubmissions();
        }
        
        function searchSubmissions() {
            currentSearch = document.getElementById('searchInput').value;
            displaySubmissions();
        }
        
        function refreshData() {
            loadData();
            showToast('🔄 Data refreshed!', 'success');
        }
        
        // ========== LOGOUT ==========
        function logout() {
            localStorage.removeItem('adminAuthenticated');
            localStorage.removeItem('adminPasskey');
            window.location.href = '/';
        }
        
        function handleUnauthorized() {
            alert('Session expired. Please login again.');
            logout();
        }
        
        // ========== HELPER FUNCTIONS ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#28a745' : '#17a2b8'};
                color: white;
                padding: 12px 24px;
                border-radius: 10px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // ========== INITIALIZE ==========
        loadData();
        
        // Auto-refresh every 60 seconds
        setInterval(() => {
            loadStats();
        }, 60000);
    </script>
</body>
</html>
